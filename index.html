<!DOCTYPE html>
<html>
<head>
    <title>PIN PAD</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Aerial;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            height: 100vh;
        }

        .person img {
            width: 250px;
        }

        .pinpad {
            text-align: center;
        }

        #display {
            font-size: 30px;
            margin: 20px;
        }

        button {
            width: 70px;
            height: 70px;
            margin: 5px;
            font-size: 25px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="person">
            <img src="https://static.vecteezy.com/system/resources/previews/024/281/507/large_2x/cute-businessman-icon-free-png.png"
                 alt="Me">
        </div>

        <div class="pinpad">
        
            <h1>Enter PIN</h1>
            <div id = "display">----</div>

            <button onclick="addNumber('1')">1</button>
            <button onclick="addNumber('2')">2</button>
            <button onclick="addNumber('3')">3</button>
            <br>

            <button onclick="addNumber('4')">4</button>
            <button onclick="addNumber('5')">5</button>
            <button onclick="addNumber('6')">6</button>
            <br>

            <button onclick="addNumber('7')">7</button>
            <button onclick="addNumber('8')">8</button>
            <button onclick="addNumber('9')">9</button>
            <br>

            <button onclick="clear()">Clear</button>
            <button onclick="addNumber('0')">0</button>
            <button onclick="checkPin()">Enter</button>

            <p id="message"></p>
        </div>
    </div>
        

    <script>
        let pin = "";

        function addNumber(number) {
            if (pin.length < 4) {
                pin += number;
                document.getElementById("display").textContent = "*".repeat(pin.length);
            }
        }

        function clearPin() {
            pin = "";
            document.getElementById("display").textContent = "----";
            document.getElementById("message").textContent = "";
        }

        function checkPin() {
            if (pin === "1234") {
                document.getElementById("message").textContent = "Correct PIN!";
            } else {
                document.getElementById("message").textContent = "Incorrect PIN!";
                pin = "";
                document.getElementById("display").textContent = "----";
            }
        }               
    </script>
</body>
</html>
